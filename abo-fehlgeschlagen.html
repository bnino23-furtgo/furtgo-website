<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Furtgo – Zahlung fehlgeschlagen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .icon { font-size: 80px; margin-bottom: 24px; color: #ff6b6b; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 16px; color: #aaa; max-width: 420px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #FFD700;
      color: #000;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.9; }
    .info { font-size: 13px; color: #666; margin-top: 24px; max-width: 380px; }
  </style>
</head>
<body>
  <div class="icon">✕</div>
  <h1>Zahlung nicht erfolgreich</h1>
  <p>Die Karte konnte nicht belastet werden. Kein Problem — versuche es nochmal oder nutze eine andere Karte.</p>
  <a href="furtgo://" class="btn">Zurück zur App</a>
  <p class="info">Bei Problemen: Bajic Mobility Solutions, 078 315 75 16</p>
</body>
</html>
